services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    networks:
      - techmove-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' -b -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  glms-backend-api:
    build:
      context: .
      dockerfile: TechMoveGLMS.API/Dockerfile
    container_name: glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: 8080
    ports:
      - "5003:8080"
    networks:
      - techmove-net
    depends_on:
      sql-server-db:
        condition: service_healthy

  glms-frontend-web:
    build:
      context: .
      dockerfile: ST10398576_TechMoveGLMS/Dockerfile
    container_name: glms-frontend-web
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: 8080
    ports:
      - "7095:8080"
    networks:
      - techmove-net
    depends_on:
      - glms-backend-api

networks:
  techmove-net:
    driver: bridge
